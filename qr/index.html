<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - Tony Cagliano Memorial</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .qr-container {
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        .qr-container img {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
            display: block;
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #e74c3c;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: color 0.2s ease;
        }
        .back-link:hover {
            text-decoration: underline;
            color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="qr-container">
        <img src="TonyCagliano_QRCode.png" alt="Tony Cagliano Memorial QR Code">
        <a href="../index.html" class="back-link">&larr; Back to Memorial</a>
    </div>
</body>
</html>
